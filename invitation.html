<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitation - Yvette & Daniel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,500&family=Montserrat:wght@400;700;800&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --bleu-principal: #1a3a63;
            --bleu-clair: #2865bc;
            --beige-fond: #fdfcf7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Cormorant Garamond', serif; background-color: var(--beige-fond); overflow-x: hidden; }

        /* --- HERO PARALLAX MOBILE FRIENDLY --- */
        .hero-parallax {
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden; /* Important pour contenir l'image */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parallax-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 120%; /* Plus grande pour avoir de la marge de mouvement */
            background-image: url('bisous.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            will-change: transform; /* Optimisation mobile */
        }

        .hero-parallax::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero-content h1 {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(4.5rem, 18vw, 7rem);
            line-height: 0.85;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }
        .hero-content h1 span { display: block; }

        /* --- COUNTDOWN CAPSULES --- */
        .countdown { display: flex; justify-content: center; gap: 8px; }
        .count-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px; border-radius: 12px;
            min-width: 65px; backdrop-filter: blur(5px);
        }
        .count-num { font-family: 'Montserrat'; font-weight: 800; font-size: 1.2rem; color: var(--bleu-principal); display: block; }
        .count-label { font-size: 0.55rem; text-transform: uppercase; color: #666; letter-spacing: 1px; }

        /* --- CONTENU --- */
        .section-white { background: white; padding: 60px 20px; position: relative; z-index: 10; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .card-img { width: 100%; max-width: 600px; margin: 0 auto 40px; display: block; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-radius: 4px; }

        h2 { font-family: 'Pinyon Script', cursive; font-size: 3.5rem; color: var(--bleu-principal); text-align: center; margin-bottom: 15px; }
        .details { text-align: center; font-size: 1.4rem; margin-bottom: 30px; }

        .btn-waze { display: block; width: fit-content; margin: 0 auto; padding: 12px 30px; border: 1px solid var(--bleu-principal); color: var(--bleu-principal); text-decoration: none; font-family: 'Montserrat'; font-weight: 700; font-size: 0.7rem; letter-spacing: 2px; }

        /* --- FORMULAIRE --- */
        .rsvp-container { max-width: 600px; margin: 60px auto; padding: 20px; background: #fff; }
        .rsvp-column { background: var(--beige-fond); padding: 25px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        label { display: block; font-family: 'Montserrat'; font-weight: 700; font-size: 0.65rem; color: var(--bleu-principal); margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: none; border-bottom: 1px solid #ccc; background: transparent; font-family: inherit; font-size: 1.1rem; outline: none; margin-bottom: 20px; }
        .submit-btn { width: 100%; padding: 20px; background: var(--bleu-principal); color: white; border: none; font-family: 'Montserrat'; font-weight: 700; letter-spacing: 2px; }

        .guest-details { max-height: 0; overflow: hidden; transition: 0.4s ease; opacity: 0; }
        .guest-details.show { max-height: 200px; opacity: 1; }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 5.2rem; }
        }
    </style>
</head>
<body>

<header class="hero-parallax">
    <div class="parallax-bg" id="parallaxBg"></div>

    <div class="hero-content">
        <h1>
            <span>Yvette</span>
            <span style="font-size: 0.5em; opacity: 0.8;">&</span>
            <span>Daniel</span>
        </h1>

        <div class="countdown">
            <div class="count-box"><span class="count-num" id="d">00</span><span class="count-label">Jours</span></div>
            <div class="count-box"><span class="count-num" id="h">00</span><span class="count-label">Hrs</span></div>
            <div class="count-box"><span class="count-num" id="m">00</span><span class="count-label">Min</span></div>
            <div class="count-box"><span class="count-num" id="s">00</span><span class="count-label">Sec</span></div>
        </div>
    </div>
</header>

<div class="section-white">
    <img src="mairie.png" alt="Mairie" class="card-img">
    <h2>Cérémonie Civile</h2>
    <p class="details">Mairie du 19e arrondissement<br>Dimanche 21 Juin 2026 à 14h00</p>
    <a href="https://waze.com" class="btn-waze">PLAN WAZE</a>
</div>

<div class="section-white" style="background: var(--beige-fond);">
    <img src="houppa.jpg" alt="Houppa" class="card-img">
    <h2>La Houppa</h2>
    <p class="details">InterContinental Paris - Le Grand<br>À partir de 17h30</p>
    <a href="https://waze.com" class="btn-waze">PLAN WAZE</a>
</div>

<section class="section-white">
    <div class="rsvp-container">
        <h2 style="font-size: 3rem;">RSVP</h2>
        <form id="rsvpForm">
            <label>NOM & PRÉNOM</label>
            <input type="text" required placeholder="Ex: Famille Levy">

            <div class="rsvp-column">
                <label>MAIRIE</label>
                <select onchange="toggle(this, 'm_det')">
                    <option value="non">Absent</option>
                    <option value="oui">Présent</option>
                </select>
                <div id="m_det" class="guest-details">
                    <label style="margin-top:10px">ADULTES</label>
                    <input type="number" value="1">
                    <label>ENFANTS</label>
                    <input type="number" value="0">
                </div>
            </div>

            <div class="rsvp-column">
                <label>HOUPPA & SOIRÉE</label>
                <select onchange="toggle(this, 'h_det')">
                    <option value="non">Absent</option>
                    <option value="oui">Présent</option>
                </select>
                <div id="h_det" class="guest-details">
                    <label style="margin-top:10px">ADULTES</label>
                    <input type="number" value="1">
                    <label>ENFANTS</label>
                    <input type="number" value="0">
                </div>
            </div>

            <label>UN PETIT MOT ?</label>
            <textarea rows="3"></textarea>

            <button type="submit" class="submit-btn">ENVOYER</button>
        </form>
    </div>
</section>

<script>
    // --- SCRIPT PARALLAX TEL ---
    window.addEventListener('scroll', function() {
        const scroll = window.pageYOffset;
        // On déplace le fond de 30% de la vitesse du scroll
        document.getElementById('parallaxBg').style.transform = 'translateY(' + (scroll * 0.3) + 'px)';
    });

    // --- COUNTDOWN ---
    const target = new Date("2026-06-21T14:00:00").getTime();
    setInterval(() => {
        const diff = target - new Date().getTime();
        document.getElementById("d").innerText = Math.floor(diff / (1000*60*60*24));
        document.getElementById("h").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
        document.getElementById("m").innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
        document.getElementById("s").innerText = Math.floor((diff % (1000*60)) / 1000);
    }, 1000);

    function toggle(sel, id) {
        document.getElementById(id).classList.toggle('show', sel.value === 'oui');
    }
</script>

</body>
</html>
